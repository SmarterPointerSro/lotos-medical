var _pw=document.getElementById("pw");if(_pw)_pw.placeholder=(GL==="en"?"Password":"Heslo");
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function go(){
  const err=document.getElementById("err"); err.textContent="";
  const pw=document.getElementById("pw").value;
  try{
    const km=await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2", salt:b64(SALT), iterations:ITER, hash:"SHA-256"}, km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(NONCE)}, key, b64(CT));
    document.open(); document.write(new TextDecoder().decode(pt)); document.close();
  }catch(e){ err.textContent=(GL==="en"?"Wrong password":"Nesprávne heslo"); }
}
